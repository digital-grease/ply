name: Build APK

# Builds an Android APK for the Flutter app. The generated Dart<->Rust bindings (app/lib/src/rust) are
# gitignored, so the workflow regenerates them (flutter_rust_bridge_codegen + build_runner) before
# building. The Rust engine cross-compiles for Android automatically via cargokit during the Gradle
# build. Produces a debug APK as a downloadable artifact.

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write # create the GitHub Release + attach the APK on tag builds
    env:
      # Release signing. Add these as repository secrets to produce a properly signed APK. When the
      # keystore secret is empty (fork PRs, or before secrets are configured), the release build falls
      # back to debug signing so it still succeeds. See android/app/build.gradle.kts.
      KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      PLY_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      PLY_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      PLY_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      # Prebuilt binary install (fast); the codegen tool must match the frb runtime in pubspec.yaml.
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install flutter_rust_bridge_codegen
        run: cargo binstall -y flutter_rust_bridge_codegen@2.12.0 || cargo install flutter_rust_bridge_codegen --version 2.12.0 --locked

      - name: Pub get
        working-directory: app
        run: flutter pub get

      # The bindings are gitignored, so generate them from rust/ply-bridge (reads flutter_rust_bridge.yaml).
      - name: Generate Rust <-> Dart bindings
        run: flutter_rust_bridge_codegen generate

      # Regenerate freezed unions (e.g. DriveDto) that depend on the generated DTOs.
      - name: Generate freezed code
        working-directory: app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Rust engine tests
        working-directory: rust
        run: cargo test -p ply-common -p ply-weave -p ply-knit -p ply-nalbind -p ply_bridge

      - name: Flutter host tests
        working-directory: app
        run: flutter test

      # Materialize the keystore from the base64 secret (read from the environment, not interpolated)
      # and point the Gradle signing config at it. Skipped when the secret is absent, so the release
      # build below debug-signs as a fallback. No keystore is ever stored in the repo.
      - name: Decode release keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: |
          python3 -c "import base64, os; open(os.environ['RUNNER_TEMP'] + '/release.jks', 'wb').write(base64.b64decode(os.environ['KEYSTORE_BASE64']))"
          echo "PLY_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"

      - name: Build release APK
        working-directory: app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ply-release-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      # On a version tag (e.g. v0.1.0), publish a GitHub Release and attach the signed APK.
      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
