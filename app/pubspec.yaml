name: ply
description: Pattern tool for weaving, knitting, and nalbinding (weaving first).
publish_to: "none"
version: 0.1.5+6

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # FFI bridge to the Rust engine (rust/ply-bridge). Generated bindings land in
  # lib/src/rust via `flutter_rust_bridge_codegen generate`.
  flutter_rust_bridge: 2.12.0
  file_picker: ^8.0.0   # importing .wif files from device storage
  image_picker: ^1.1.2  # attaching project photos (camera + gallery); stored on-device
  path_provider: ^2.1.5 # app documents dir for the on-device draft library
  path: ^1.9.0          # join() the drafts dir + id stems (no manual separators)
  uuid: ^4.5.3          # v4 ids for draft filenames (collision-free, rename-stable)
  freezed_annotation: ^2.4.4 # frb mirrors the DriveDto sum-type as a freezed sealed class
  flutter_riverpod: ^2.5.1 # editor state: the live-preview provider ref.watches DraftDoc (next phase)
  collection: ^1.18.0 # DeepCollectionEquality/.hash for deep value-equality of DraftDoc's nested lists
  dynamic_color: ^1.7.0 # M4: Material You dynamic color from the device palette (with seed fallback)
  http: ^1.2.2 # OPTIONAL Ravelry connector only (the rest of the app is fully offline)
  flutter_secure_storage: ^9.2.2 # store the user's own Ravelry key in the platform keystore
  rust_lib_ply:
    path: rust_builder

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  ffigen: ^11.0.0
  build_runner: ^2.4.13 # runs freezed codegen for the generated *.freezed.dart files
  freezed: ^2.5.7

flutter:
  uses-material-design: true
